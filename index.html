<!DOCTYPE html>
<html>

<head>

<title>Cosmic Explorer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="stars"></div>


<header>

<h1>🌌 COSMIC EXPLORER</h1>

<p>Discover the mysteries of the universe</p>


<div class="buttons">

<button onclick="filter('all')">Universe</button>
<button onclick="filter('planet')">Planets</button>
<button onclick="filter('galaxy')">Galaxies</button>
<button onclick="filter('space')">Space</button>

</div>

</header>



<section class="space-gallery">


<div class="card planet">

<img src="https://images.unsplash.com/photo-1614728263952-84ea256f9679">

<div class="content">

<h2>Mars</h2>

<p>The red planet waiting to be explored</p>

</div>

</div>



<div class="card galaxy">

<img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564">

<div class="content">

<h2>Galaxy</h2>

<p>Millions of stars in deep space</p>

</div>

</div>




<div class="card space">

<img src="https://images.unsplash.com/photo-1446776877081-d282a0f896e2">

<div class="content">

<h2>Astronaut</h2>

<p>Beyond Earth's atmosphere</p>

</div>

</div>





<div class="card planet">

<img src="https://images.unsplash.com/photo-1614314107768-6018061b5b72">

<div class="content">

<h2>Earth</h2>

<p>Our beautiful blue planet</p>

</div>

</div>





<div class="card galaxy">

<img src="https://images.unsplash.com/photo-1504333638930-c8787321eee0">

<div class="content">

<h2>Nebula</h2>

<p>Birthplace of stars</p>

</div>

</div>





<div class="card space">

<img src="https://images.unsplash.com/photo-1517976547714-720226b864c1">

<div class="content">

<h2>Rocket</h2>

<p>Journey into infinity</p>

</div>

</div>



</section>


<script src="script.js"></script>


</body>

</html>
